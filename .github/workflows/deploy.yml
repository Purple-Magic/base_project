name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        type: string
        description: 'Environment name'
        required: true
      branch:
        type: string
        required: true
      RAILS_ENV:
        type: string
        required: true
      success_title:
        type: string
        required: true
      success_description:
        type: string
        required: true
      success_color:
        type: number
        required: true
      failure_title:
        type: string
        required: true
      failure_description:
        type: string
        required: true
      failure_color:
        type: number
        required: true
      link:
        type: string
        required: true
      first_field:
        type: string
        required: true
      first_value:
        type: string
        required: true
      second_field:
        type: string
        required: true
      second_value:
        type: string
        required: true
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        required: true

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    name: Deploy
    timeout-minutes: 10
    strategy:
      fail-fast: false

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Load secrets and variables from 1Password
        id: onepassword
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_NAME: op://base_project/Deployment/APP_NAME
          MAIN_HOST: op://base_project/Deployment/MAIN_HOST
          RAILS_MASTER_KEY: op://base_project/Deployment/RAILS_MASTER_KEY
          SSH_KEY: op://base_project/Deployment/SSH_KEY
          SSH_USER: op://base_project/Deployment/SSH_USER

      - name: Configure SSH for all hosts
        run: |
          mkdir -p ~/.ssh/

          ruby .github/scripts/normalize_ssh_key.rb

          cat >>~/.ssh/config <<END
          Host ${{ env.MAIN_HOST }}
            HostName %h
            User ${{ env.SSH_USER }}
            IdentityFile ~/.ssh/production.key
            StrictHostKeyChecking no
          END
        env:
          SSH_KEY: ${{ env.SSH_KEY }}

      - name: Verify SSH key loaded
        run: |
          if [[ -z "$SSH_KEY" ]]; then
            echo "SSH_KEY is empty; failing early."
            exit 1
          fi

          if ! test -s ~/.ssh/production.key; then
            echo "SSH private key file is missing or empty."
            exit 1
          fi

          echo "SSH key fingerprint:"
          ssh-keygen -lf ~/.ssh/production.key
        env:
          SSH_KEY: ${{ env.SSH_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1

      - name: Install kamal
        run: gem install kamal

      - name: Write secrets to .kamal/secrets.${{ inputs.environment }} file
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets.${{ inputs.environment }} << EOF
          RAILS_MASTER_KEY=${{ env.RAILS_MASTER_KEY }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Kamal proxy reboot --rolling
        env:
          APP_NAME: ${{ env.APP_NAME }}
          MAIN_HOST: ${{ env.MAIN_HOST }}
          RAILS_ENV: ${{ inputs.RAILS_ENV }}
        run: kamal proxy reboot -y -d ${{ inputs.environment }}

      - name: Kamal deploy
        env:
          HOST: ${{ env.HOST }}
          APP_NAME: ${{ env.APP_NAME }}
          RAILS_ENV: ${{ inputs.RAILS_ENV }}
          MAIN_HOST: ${{ env.MAIN_HOST }}
        run: kamal deploy -vvvv -d ${{ inputs.environment }}

      - name: Discord success notification
        if: success()
        env:
          WEBHOOK_URL: ${{ env.DISCORD_WEBHOOK_URL }}
          TITLE: ${{ inputs.success_title }}
          DESCRIPTION: ${{ inputs.success_description }}
          COLOR: ${{ inputs.success_color }}
          URL: ${{ inputs.link }}
          FIRST_FIELD: ${{ inputs.first_field }}
          FIRST_VALUE: ${{ inputs.first_value }}
          SECOND_FIELD: ${{ inputs.second_field }}
          SECOND_VALUE: ${{ inputs.second_value }}
        run: ruby .github/scripts/discord_notification.rb

      - name: Discord failure notification
        if: failure()
        env:
          WEBHOOK_URL: ${{ env.DISCORD_WEBHOOK_URL }}
          TITLE: ${{ inputs.failure_title }}
          DESCRIPTION: ${{ inputs.failure_description }}
          COLOR: ${{ inputs.failure_color }}
          URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FIRST_FIELD: ${{ inputs.first_field }}
          FIRST_VALUE: ${{ inputs.first_value }}
          SECOND_FIELD: ${{ inputs.second_field }}
          SECOND_VALUE: ${{ inputs.second_value }}
        run: ruby .github/scripts/discord_notification.rb
